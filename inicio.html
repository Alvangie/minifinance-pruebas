<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>MiniFinance - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="layout">

    <!-- SIDEBAR DE LA APLICACIÓN -->
    <aside class="sidebar">
        <h2>MiniFinance</h2>

        <nav>
            <ul>
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="simulador.html">Simulador</a></li>
            </ul>
        </nav>

        <hr>

        <!-- MÓDULO A: META DE AHORRO CONFIGURABLE -->
        <section class="panel-meta-premium" id="tarjeta-meta-ahorro" aria-labelledby="meta-titulo">
            <header class="meta-premium-header">
                <span class="meta-icono" aria-hidden="true">🎯</span>
                <h3 id="meta-titulo">Meta de ahorro</h3>
            </header>
            
            <article class="meta-premium-body">
                <form id="form-configurar-meta" class="form-meta-input">
                    <label for="input-monto-meta">Configurar objetivo ($):</label>
                    <input type="text" id="input-monto-meta" inputmode="numeric" pattern="[0-9]*" placeholder="Ej: 500000" required>
                    <button type="submit" class="btn-meta-fijar">Fijar Meta</button>
                </form>

                <h4 id="txt-meta-nombre">Ahorrar para mi viaje</h4>
                <p class="monto-destacado-premium" id="txt-meta-monto">$0</p>
                
                <section class="progreso-wrapper-clean">
                    <progress id="barra-progreso-nativa" value="0" max="100"></progress>
                    <span id="txt-meta-porcentaje">0% completado</span>
                </section>
            </article>
            
            <footer class="meta-premium-footer">
                <p>Llevás guardado: <span id="txt-meta-ahorrado" class="break-monto">$0</span></p>
                <p class="texto-secundario">Faltan: <span id="txt-meta-restante" class="break-monto">$0</span></p>
                <button type="button" class="btn-meta-accion" id="btn-ver-metas">Ver metas</button>
            </footer>
        </section>

        <!-- MÓDULO B: CONTROLADOR DE TEMA VISUAL -->
        <section class="panel-control-tema" aria-label="Selector de tema visual">
            <label for="input-switch-tema" class="label-tema">
                <span id="icono-estado-tema">🌙</span> Modo oscuro
            </label>
            <input type="checkbox" id="input-switch-tema">
        </section>
    </aside>

    <!-- PANEL PRINCIPAL DEL DASHBOARD -->
    <section class="dashboard-main">
        <header>
            <h1>Dashboard</h1>
        </header>

        <section class="panel-resumen">
            <h2>Resumen</h2>
            <p>Ingresos: <span id="resumen-ingresos" class="break-monto">$0</span></p>
            <p>Gastos: <span id="resumen-gastos" class="break-monto">$0</span></p>
            <p>Saldo: <span id="resumen-saldo" class="break-monto">$0</span></p>
        </section>

        <hr>

        <section class="contenedor-movimientos">

            <!-- MÓDULO C: GRÁFICO DE GASTOS -->
            <section class="panel panel-grafico" aria-labelledby="grafico-titulo">
                <h2 id="grafico-titulo">Gastos por categoría</h2>
                
                <figure class="wrapper-dona-grafica">
                    <figcaption class="centro-vacio-dona">
                        <small class="text-muted">Total Gastos</small>
                        <strong id="monto-total-grafico" class="break-monto">$0</strong>
                    </figcaption>
                </figure>

                <ul id="leyenda-dinamica-gastos" class="lista-leyenda-clean"></ul>
            </section>

            <!-- FORMULARIO CORREGIDO (SIN CÓDIGO SUELTO ABAJO) -->
            <section class="panel">
                <h2>Agregar movimiento</h2>
                <form id="form-movimiento">
                    <label for="tipo">Tipo:</label>
                    <select id="tipo">
                        <option value="Ingreso">Ingreso</option>
                        <option value="Gasto">Gasto</option>
                    </select>

                    <section id="contenedor-categoria-dinamica" class="grupo-formulario-oculto">
                        <label for="categoria">Categoría del Gasto:</label>
                        <select id="categoria">
                            <option value="Alimentación">Alimentación</option>
                            <option value="Ocio">Ocio</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Servicios">Servicios</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </section>

                    <label for="monto">Monto:</label>
                    <input type="text" id="monto" inputmode="numeric" pattern="[0-9]*" placeholder="Monto" required>

                    <button type="submit">Agregar</button>
                </form>
            </section>


            <!-- LISTA DE MOVIMIENTOS RECIENTES -->
            <section class="panel">
                <h2>Movimientos recientes</h2>
                <ul id="listaMovimientos" class="lista-movimientos-clean"></ul>
            </section>

        </section>
    </section>
</main>

<script src="main.js"></script>
</body>
</html>
