<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MiniFinance - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>MiniFinance</h2>

        <nav>
            <ul>
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="simulador.html">Simulador</a></li>
            </ul>
        </nav>

        <hr>

<section class="panel-meta-premium" id="tarjeta-meta-ahorro" aria-labelledby="meta-titulo">
    <header class="meta-premium-header">
        <span class="meta-icono" aria-hidden="true">🎯</span>
        <h3 id="meta-titulo">Meta de ahorro</h3>
    </header>
    
    <article class="meta-premium-body">
        <h4 id="txt-meta-nombre">Ahorrar para mi viaje</h4>
        <p class="monto-destacado-premium" id="txt-meta-monto">$500.000</p>
        
        <section class="progreso-wrapper-clean">
            <progress id="barra-progreso-nativa" value="0" max="100"></progress>
            <span id="txt-meta-porcentaje">0% completado</span>
        </section>
    </article>
    
    <footer class="meta-premium-footer">
        <p>Llevás guardado: <span id="txt-meta-ahorrado">$0</span></p>
        <p class="texto-secundario">Faltan: <span id="txt-meta-restante">$0</span></p>
        <button type="button" class="btn-meta-accion" id="btn-ver-metas">Ver metas</button>
    </footer>
</section>

    </aside>

    <!-- MAIN -->
    <main>
        <header>
            <h1>Dashboard</h1>
        </header>

        <!-- Resumen (sin lógica todavía) -->
        <section>
            <h2>Resumen</h2>
            <p>Ingresos: $0</p>
            <p>Gastos: $0</p>
            <p>Saldo: $0</p>
        </section>

        <hr>

        <!-- 🔥 LO IMPORTANTE: DOS COLUMNAS -->
        <div class="contenedor-movimientos">

            <!-- IZQUIERDA -->
            <section class="panel">
                <h2>Agregar movimiento</h2>

                <form onsubmit="agregarMovimiento(); return false;">
                    
                    <label>Tipo:</label>
                    <select id="tipo">
                        <option value="Ingreso">Ingreso</option>
                        <option value="Gasto">Gasto</option>
                    </select>

                    <label>Monto:</label>
                    <input type="number" id="monto" placeholder="Monto">

                    <button type="submit">Agregar</button>
                </form>
            </section>

            <!-- DERECHA -->
            <section class="panel">
                <h2>Movimientos recientes</h2>
                <div id="listaMovimientos"></div>
            </section>

        </div>
    </main>

</div>

<script src="main.js"></script>
</body>
</html>
